<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Map of Nourish food collection locations in Ladywood.">
  <title>Food Map | Nourish</title>
  <link rel="stylesheet" href="./ol.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="../public/css/accessibility.css">
  <script src="../public/javascript/accessibility.js" defer></script>
</head>
<body>
  <header class="app-header">
    <div class="header-logo">
      <a href="../public/MainPage.html"><h1>Nourish</h1></a>
      <p>Mapping food security. Speaking your language.</p>
    </div>
    <nav aria-label="Map navigation">
      <a href="../public/MainPage.html">Home</a>
      <a href="../public/AllItem.html">Available food</a>
    </nav>
    <form id="map-search" role="search">
      <label class="visually-hidden" for="map-search-input">Search locations or food</label>
      <input id="map-search-input" name="search" type="search" maxlength="100" placeholder="Search map">
      <button class="search-btn" type="submit" aria-label="Search locations or food">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
        </svg>
      </button>
    </form>
  </header>

  <p id="map-status" class="status-message map-status" role="status" aria-live="polite"></p>

  <main class="content-container">
    <section id="map-view" class="view active" aria-label="Food collection map">
      <div id="map"></div>
      <div class="availability-card">
        <p class="card-title">Active collection locations</p>
        <div class="indicator-row">
          <span class="status-dot" aria-hidden="true"></span>
          <span class="status-text" id="location-count">Loading...</span>
        </div>
      </div>
    </section>

    <section id="list-view" class="view hidden" aria-label="Food collection location list">
      <div class="list-container" id="location-list"></div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Map display mode">
    <button id="btn-map" class="nav-item active" type="button" aria-label="Switch to map view" aria-pressed="true">
      <span class="text">Map</span>
    </button>
    <button id="btn-list" class="nav-item" type="button" aria-label="Switch to list view" aria-pressed="false">
      <span class="text">List</span>
    </button>
  </nav>

  <aside id="accessibility" aria-label="Accessibility controls">
    <button id="button_large" type="button" aria-label="Increase text size">
      <img src="../public/resources/text_increase_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
    </button>
    <button id="button_small" type="button" aria-label="Decrease text size">
      <img src="../public/resources/text_decrease_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
    </button>
    <button id="button_TTS" type="button" aria-label="Toggle text-to-speech controls" aria-expanded="false">
      <img src="../public/resources/text_to_speech_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
    </button>
    <div class="tts-controls" hidden>
      <button id="button_TTS_backward" type="button" aria-label="Read previous item">
        <img src="../public/resources/arrow_back_ios_new_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
      </button>
      <button id="button_TTS_pause" type="button" aria-label="Pause or resume speech">
        <img src="../public/resources/play_pause_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
      </button>
      <button id="button_TTS_play" type="button" aria-label="Read page from beginning">
        <img src="../public/resources/autoplay_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
      </button>
      <button id="button_TTS_forward" type="button" aria-label="Read next item">
        <img src="../public/resources/arrow_forward_ios_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
      </button>
    </div>
  </aside>

  <script src="./ol.js"></script>
  <script type="module" src="./map-app.js"></script>
</body>
</html>
