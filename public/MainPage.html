<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nourish</title>
    <link rel="stylesheet" href="./css/MainPage.css">

     <link rel="stylesheet" href="./css/accessibility.css">
    <script src="./javascript/accessibility.js" defer></script>
</head>
<body>

<header>
    <a href="/">
      <img src="./resources/logo_placeholder.png" alt="nourish logo">
    </a>

    <nav>
        <a href="login.html">Log In</a>
        <a href="admin-login">Admin</a>
    </nav>
</header>

<main>

    <p id="area">
        Serving Ladywood & surrounding areas
    </p>

    <h1>
        Fighting hunger.<br>
        Zero waste.
    </h1>

    <p>
        Nourish connects local businesses with surplus food to volunteers,
        food banks, and families who need it most — keeping food out of
        landfill and on people's plates.
    </p>

    <div id="search">
        <input type="text" placeholder="Search food or location...">
        <button>Search</button>
    </div>

    <div>
        <button onclick="window.location.href='map.html'">
        View Live Map </button>
        <button onclick="window.location.href='Listfood.html'">
        List Food </button> 
        <button onclick="window.location.href='allitem.html'">
        All Food </button>
    </div>

</main>

<aside id="accessibility">
      <button id="button_large"><img
          src="./resources/text_increase_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
      <button id="button_small"><img
          src="./resources/text_decrease_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
      <button id="button_TTS"><img src="./resources/text_to_speech_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
      <div><button id="button_TTS_backward"><img
            src="./resources/arrow_back_ios_new_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
        <button id="button_TTS_pause"><img
            src="./resources/play_pause_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
        <button id="button_TTS_play"><img
            src="./resources/autoplay_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
        <button id="button_TTS_forward"><img
            src="./resources/arrow_forward_ios_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
      </div>
    </aside>

<footer>
    <p> © 2026 Nourish. Helping the community of Ladywood</p>
</footer>

</body>
</html>
