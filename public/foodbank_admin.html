<!DOCTYPE html>
<html lang="en">
<head>
    <title>Nourish: Food Bank Admin Page</title>
    <link rel="stylesheet" href="css/foodbank_admin.css">

    <meta charset="UTF-8">
    <meta name="description" content="Food bank login page">
    <meta name="frontend author" content="Harry">

</head>
<body>
<header>
    <link rel = "stylesheet" href = "css/bannerfooter.css">
    <h1>Nourish</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="map.html">Map</a>
        <a href="AllItem.html">All Food Items</a>
        <a href="foodbank_login.html" class="admin-btn">Admin Login</a>
    </nav>
</header>

<main>
    <h2>Name of food bank</h2>
    <section id="sidePanel">
        <h3>Filters</h3>
        <form id="form">
            <label>Food Item:</label>
            <input name="foodItem" type="text">
            <label>Quantity:</label>
            <div class="filterToggles">
                <label><</label>
                <label>=</label>
                <label>></label>
            </div>
            <div class="filterToggles">
                <input type="radio" name="quantitySymbol" value="<">
                <input type="radio" name="quantitySymbol" value="=" checked="checked">
                <input type="radio" name="quantitySymbol" value=">">
            </div>
            <input name="quantity" type="text">
            <label>Expiry Date:</label>
            <div class="filterToggles">
                <label><</label>
                <label>=</label>
                <label>></label>
            </div>
            <div class="filterToggles">
                <input type="radio" name="expirySymbol" value="<">
                <input type="radio" name="expirySymbol" value="=" checked="checked">
                <input type="radio" name="expirySymbol" value=">">
            </div>
            <input name="date" type="text">
            <input type="submit">
        </form>
        <h3>Add items</h3>
        <form>
            <label>Food Item:</label>
            <input type="text">
            <label>Quantity:</label>
            <input type="text">
            <label>Expiry Date:</label>
            <input type="text">
            <input type="submit">
        </form>
    </section>
    <ul>
        <section id="invHead">
            <p>Food Item</p>
            <p>Quantity</p>
            <p>Expiry</p>
            <p>Delete</p>
        </section>

        <div id="list"><! filled from database >

        </div>
    </ul>
</main>

<footer>
    <nav>
        <a href="index.html">Home</a>
        <a href="map.html">Map</a>
        <a href="AllItem.html">All Food Items</a>
        <a href="foodbank_login.html">Admin Login</a>
    </nav>
    <p> 2026 Nourish. Helping the community of Ladywood</p>
</footer>

<script src="javascript/foodbank_admin.js"></script>

</body>

</html>
