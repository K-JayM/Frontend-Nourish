<!DOCTYPE html>
<html lang="en">

<head>
    <title>Nourish: Foodbank Log in</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="css/foodbank_login.css">

    <script type="module" src="javascript/foodbank_login.js" defer></script>

    <meta charset="UTF-8">
    <meta name="description" content="Food bank login page">
    <meta name="frontend author" content="Martin">

    <link rel="stylesheet" href="./css/accessibility.css">
    <script src="./javascript/accessibility.js" defer></script>

</head>

<body>
    <header></header>
    <main>
        <div>
            <section>
                <img src="resources/logo_placeholder2.png">
                <h1>Food bank log-in</h1>
            </section>

            <form method="post" id="login_section" action="" onsubmit="">
                <label for="email">Email</label><br>
                <input type="text" for="email" id="email" required><br>
                <label for="password">Password</label><br>
                <input type="password" for="password" id="password" required><br>
                <label id="message">This section is for registered food banks ONLY. <br> Either contact the developers
                    to regsiter or <a href="./AllItem.html">View as a general user</a></label>
                <input type="submit" value="Login">
            </form>

        </div>
    </main>

    <aside id="accessibility">
      <button id="button_large"><img
          src="./resources/text_increase_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
      <button id="button_small"><img
          src="./resources/text_decrease_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
      <button id="button_TTS"><img src="./resources/text_to_speech_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
      <div><button id="button_TTS_backward"><img
            src="./resources/arrow_back_ios_new_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
        <button id="button_TTS_pause"><img
            src="./resources/play_pause_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
        <button id="button_TTS_play"><img
            src="./resources/autoplay_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
        <button id="button_TTS_forward"><img
            src="./resources/arrow_forward_ios_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg"></button>
      </div>
    </aside>

</body>

</html>
