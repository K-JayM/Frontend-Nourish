<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Administrator login for Nourish food bank management.">
  <title>Admin Login | Nourish</title>
  <link rel="stylesheet" href="./css/foodbank_login.css">
  <link rel="stylesheet" href="./css/accessibility.css">
  <script src="./javascript/accessibility.js" defer></script>
  <script type="module" src="./javascript/foodbank_login.js"></script>
</head>
<body>
  <header class="simple-header">
    <a href="./MainPage.html">Nourish home</a>
  </header>

  <main>
    <div class="login-card">
      <section>
        <img src="./resources/logo_placeholder2.png" alt="Nourish">
        <h1>Food bank admin login</h1>
      </section>

      <form id="login_section">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required>

        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          minlength="8"
          required
        >

        <p>
          This section is for registered administrators only.
          <a href="./MainPage.html">Return to the main page</a>.
        </p>
        <p id="login-message" class="status-message" role="alert" hidden></p>
        <button id="login-submit" type="submit">Log in</button>
      </form>
    </div>
  </main>

  <aside id="accessibility" aria-label="Accessibility controls">
    <button id="button_large" type="button" aria-label="Increase text size">
      <img src="./resources/text_increase_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
    </button>
    <button id="button_small" type="button" aria-label="Decrease text size">
      <img src="./resources/text_decrease_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
    </button>
    <button id="button_TTS" type="button" aria-label="Toggle text-to-speech controls" aria-expanded="false">
      <img src="./resources/text_to_speech_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
    </button>
    <div class="tts-controls" hidden>
      <button id="button_TTS_backward" type="button" aria-label="Read previous item">
        <img src="./resources/arrow_back_ios_new_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
      </button>
      <button id="button_TTS_pause" type="button" aria-label="Pause or resume speech">
        <img src="./resources/play_pause_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
      </button>
      <button id="button_TTS_play" type="button" aria-label="Read page from beginning">
        <img src="./resources/autoplay_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
      </button>
      <button id="button_TTS_forward" type="button" aria-label="Read next item">
        <img src="./resources/arrow_forward_ios_35dp_000000_FILL0_wght400_GRAD0_opsz40.svg" alt="">
      </button>
    </div>
  </aside>
</body>
</html>
